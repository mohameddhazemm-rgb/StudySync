name: Manual Build StudyPlanner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake qt6-base-dev qtcreator libboost-all-dev

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build Project
      run: cmake --build build

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: StudyPlanner-Binary
        path: |
          build/client/studysync_client
          build/server/studysync_server
