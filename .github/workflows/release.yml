name: Build and Release

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.extract.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      
      - id: extract
        run: |
          VERSION=$(grep -oP '(?<=VERSION\s)[0-9.]+' CMakeLists.txt | head -n 1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os_name: linux
            arch: amd64
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            ext: ""
          - runner: macos-latest
            os_name: macos
            arch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - if: matrix.os_name == 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - if: matrix.os_name == 'linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'

      - if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - if: matrix.os_name == 'macos'
        run: |
          brew install qt@6 boost
          brew link --force qt@6

      - shell: bash
        run: |
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            QT_PREFIX=$(brew --prefix qt@6)
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PREFIX"
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          fi

      - run: cmake --build build --config Release --parallel

      - shell: bash
        run: |
          mkdir -p staging
          if [ -f "build/server/studysync_server" ]; then
            cp "build/server/studysync_server" "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}"
            cp "build/client/studysync_client" "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}"
          else
            echo "Binary not found in root build folder, checking subdirectories..."
            find build -name "studysync_server" -exec cp {} "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}" \;
            find build -name "studysync_client" -exec cp {} "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}" \;
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os_name }}-${{ matrix.arch }}
          path: staging/*
          retention-days: 1

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          name: Release v${{ needs.get-version.outputs.VERSION }}
          files: artifacts/*
          generate_release_notes: true
